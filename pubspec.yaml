name: spark
description: "A Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  drift: ^2.34.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  google_fonts: ^8.1.0
  image_cropper: ^12.2.1
  image_picker: ^1.2.2
  path: ^1.9.1
  path_provider: ^2.1.6
  sqlite3_flutter_libs: ^0.6.0+eol
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true

  assets:
    - assets/defaults/
    - assets/profiles/
    - assets/posts/